<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">

  <defs>
    <linearGradient id="cnnGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>
  </defs>

  <!-- Input Image Grid -->
  <g stroke="url(#cnnGrad)" stroke-width="1.5">
    <rect x="10" y="20" width="20" height="20"/>
    <rect x="30" y="20" width="20" height="20"/>
    <rect x="10" y="40" width="20" height="20"/>
    <rect x="30" y="40" width="20" height="20"/>
  </g>

  <!-- Convolution Filter -->
  <rect x="55" y="30" width="15" height="15" rx="2" fill="url(#cnnGrad)" opacity="0.8"/>

  <!-- Connection Lines -->
  <line x1="30" y1="30" x2="55" y2="37" stroke="url(#cnnGrad)" stroke-width="1.5"/>
  <line x1="30" y1="50" x2="55" y2="45" stroke="url(#cnnGrad)" stroke-width="1.5"/>

  <!-- Output Feature Map -->
  <rect x="75" y="35" width="12" height="12" rx="2" fill="url(#cnnGrad)"/>

  <!-- Label -->
  <text x="50" y="85" text-anchor="middle" fill="#E0E7FF" font-size="10" font-weight="bold">
    CNN
  </text>

</svg>