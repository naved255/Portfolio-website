<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="200" height="150" fill="none">

  <!-- Background -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#0A0A2E"/>
      <stop offset="100%" stop-color="#1A0033"/>
    </radialGradient>
  </defs>
  <rect width="200" height="150" fill="url(#bg)"/>

  <!-- Input Layer -->
  <g>
    <circle cx="30" cy="40" r="6" fill="#4A90E2"/>
    <circle cx="30" cy="75" r="6" fill="#4A90E2"/>
    <circle cx="30" cy="110" r="6" fill="#4A90E2"/>
  </g>

  <!-- Hidden Layer 1 -->
  <g>
    <circle cx="90" cy="35" r="7" fill="#7BB13F"/>
    <circle cx="90" cy="55" r="7" fill="#7BB13F"/>
    <circle cx="90" cy="75" r="7" fill="#7BB13F"/>
    <circle cx="90" cy="95" r="7" fill="#7BB13F"/>
    <circle cx="90" cy="115" r="7" fill="#7BB13F"/>
  </g>

  <!-- Hidden Layer 2 -->
  <g>
    <circle cx="140" cy="30" r="7" fill="#F5A623"/>
    <circle cx="140" cy="50" r="7" fill="#F5A623"/>
    <circle cx="140" cy="75" r="7" fill="#F5A623"/>
    <circle cx="140" cy="100" r="7" fill="#F5A623"/>
    <circle cx="140" cy="120" r="7" fill="#F5A623"/>
  </g>

  <!-- Output Layer -->
  <g>
    <circle cx="170" cy="75" r="8" fill="#FF6B6B"/>
  </g>

  <!-- Connections: Input → Hidden 1 -->
  <g stroke="#4A90E2" stroke-width="1.2" opacity="0.6">
    <path d="M36 40 L84 35"/>
    <path d="M36 40 L84 55"/>
    <path d="M36 40 L84 75"/>
    <path d="M36 75 L84 55"/>
    <path d="M36 75 L84 75"/>
    <path d="M36 75 L84 95"/>
    <path d="M36 110 L84 75"/>
    <path d="M36 110 L84 95"/>
    <path d="M36 110 L84 115"/>
  </g>

  <!-- Connections: Hidden 1 → Hidden 2 -->
  <g stroke="#7BB13F" stroke-width="1.2" opacity="0.6">
    <path d="M97 35 L133 30"/>
    <path d="M97 55 L133 50"/>
    <path d="M97 75 L133 75"/>
    <path d="M97 95 L133 100"/>
    <path d="M97 115 L133 120"/>
  </g>

  <!-- Connections: Hidden 2 → Output -->
  <g stroke="#F5A623" stroke-width="1.5" opacity="0.7">
    <path d="M147 30 L165 75"/>
    <path d="M147 50 L165 75"/>
    <path d="M147 75 L165 75"/>
    <path d="M147 100 L165 75"/>
    <path d="M147 120 L165 75"/>
  </g>

</svg>